<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sécurité Météorite</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#000428,#004e92);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:20px;
    width:100%;
    max-width:600px;
    text-align:center;
}

h1{
    margin-bottom:20px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#ff512f,#dd2476);
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-bottom:20px;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.card{
    background:rgba(255,255,255,0.15);
    padding:15px;
    border-radius:12px;
    margin-top:10px;
    text-align:left;
}

.safe{
    background:linear-gradient(45deg,#00c853,#64dd17);
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.danger{
    background:linear-gradient(45deg,#d50000,#ff1744);
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    box-shadow:0 0 15px red;
}
</style>
</head>

<body>

<div class="container">
    <h1>☄️ Sécurité Météorite</h1>
    <button onclick="verifierMeteorites()">Vérifier les objets proches</button>
    <div id="resultat"></div>
</div>

<script>

async function verifierMeteorites(){

    let apiKey = "https://api.openweathermap.org/data/2.5/weather?lat={lat}&lon={lon}&appid={API key}";

    let today = new Date().toISOString().split("T")[0];

    let url = `https://api.nasa.gov/neo/rest/v1/feed?start_date=${today}&end_date=${today}&api_key=${apiKey}`;

    try{

        let response = await fetch(url);
        let data = await response.json();

        let objets = data.near_earth_objects[today];

        let html = "";

        objets.forEach(obj => {

            let nom = obj.name;
            let taille = obj.estimated_diameter.meters.estimated_diameter_max.toFixed(0);
            let vitesse = parseFloat(obj.close_approach_data[0].relative_velocity.kilometers_per_hour).toFixed(0);
            let dangereux = obj.is_potentially_hazardous_asteroid;

            html += `
                <div class="card">
                    <h3>${nom}</h3>
                    <p>📏 Taille max : ${taille} mètres</p>
                    <p>⚡ Vitesse : ${vitesse} km/h</p>
            `;

            if(dangereux){
                html += `<div class="danger">🚨 Objet POTENTIELLEMENT dangereux !</div>`;
            }else{
                html += `<div class="safe">✅ Pas de danger immédiat.</div>`;
            }

            html += `</div>`;
        });

        document.getElementById("resultat").innerHTML = html;

    }catch(error){
        document.getElementById("resultat").innerHTML = "❌ Erreur de connexion à l'API NASA.";
    }

}

</script>

</body>
</html>
